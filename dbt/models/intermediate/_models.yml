version: 2

models:
  - name: int_financial_chf
    description: Financial actuals joined to monthly FX rates. Adds amount_chf.
    columns:
      - name: period
        tests: [not_null]
      - name: brand_key
        tests: [not_null]
      - name: amount_local
        tests: [not_null]
      - name: rate_to_chf
        description: FX rate for the row's currency and period. NULL means FX seed is missing that pair.
        tests: [not_null]
      - name: amount_chf
        description: amount_local × rate_to_chf. The reporting-currency figure.
        tests: [not_null]
