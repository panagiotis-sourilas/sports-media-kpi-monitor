<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f3d3e"/>
      <stop offset="1" stop-color="#164e50"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8ddb5"/>
      <stop offset="1" stop-color="#d4c58a"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" rx="80" fill="url(#bg)"/>

  <g transform="translate(80,120)">
    <text x="0" y="140" font-family="Georgia, 'Times New Roman', serif"
          font-size="180" font-weight="700" fill="url(#accent)"
          letter-spacing="-8">PS</text>
  </g>

  <circle cx="330" cy="70" r="10" fill="#e8ddb5" opacity="0.85"/>
  <circle cx="360" cy="90" r="4"  fill="#e8ddb5" opacity="0.55"/>
  <circle cx="342" cy="105" r="6" fill="#e8ddb5" opacity="0.7"/>
</svg>
